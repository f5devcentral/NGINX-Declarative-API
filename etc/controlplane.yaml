#
# NGINX Declarative API
# Control plane and licensing configuration
#

spec:

  #
  # Available control planes. NGINX Instance Manager and NGINX One Console currently supported
  #
  control_planes:
  - name: NGINX_Instance_Manager
    type: nms
    url: https://<NGINX_INSTANCE_MANAGER_ADDRESS>
    username: <NIM_USERNAME>
    password: <NIM_PASSWORD>
  - name: NGINX_One_Console
    type: nginxone
    url: https://<TENANT>.volterra.us
    token: <NGINX_ONE_CONSOLE_AUTHENTICATION_TOKEN>

  #
  # NGINX One licenses
  #
  licenses:
  - name: <LICENSE_NAME>
    token: <NGINX_LICENSE_TOKEN>

  #
  # Usage reporting endpoints
  #
  reporting_endpoints:
  - name: Report_to_NGINX_Instance_Manager
    endpoint: <NGINX_INSTANCE_MANAGER_ADDRESS>
    ssl_verify: false
    proxy: <EXPLICIT_FORWARD_PROXY>
    proxy_username: <EXPLICIT_FORWARD_PROXY_USERNAME>
    proxy_password: <EXPLICIT_FORWARD_PROXY_PASSWORD>
  - name: Report_to_F5
    endpoint: product.connect.nginx.com
    ssl_verify: false
    proxy: <EXPLICIT_FORWARD_PROXY>
    proxy_username: <EXPLICIT_FORWARD_PROXY_USERNAME>
    proxy_password: <EXPLICIT_FORWARD_PROXY_PASSWORD>

  #
  # Instance groups (NGINX Instance Manager) / config sync groups (NGINX One Console)
  #
  instance_groups:
  - name: <INSTANCE_GROUP_NAME>
    license: <LICENSE_NAME>
    reporting_endpoint: Report_to_F5
    grace_period: true
    control_plane: NGINX_One_Console
    synctime: 0
    modules:
    - ngx_http_app_protect_module