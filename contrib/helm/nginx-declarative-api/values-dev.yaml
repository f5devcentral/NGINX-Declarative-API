# values-dev.yaml
# Lightweight dev/local overrides.
# Usage:
#   helm install nginx-dapi ./nginx-declarative-api \
#     -f values-dev.yaml \
#     -n nginx-dapi --create-namespace

nginxDapi:
  image:
    repository: "ghcr.io/f5devcentral/nginx-declarative-api"
    tag: "latest"
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  image:
    tag: "7.2-alpine"
  persistence:
    enabled: false

devportal:
  image:
    repository: "ghcr.io/f5devcentral/nginx-declarative-api-devportal"
    tag: "latest"

webui:
  image:
    repository: "ghcr.io/f5devcentral/nginx-declarative-api-webui"
    tag: "latest"
  replicaCount: 1
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  enabled: true
  className: nginx
  host: nginx-dapi.example.com
  webuiHost: nginx-dapi-ui.example.com
  tls: []

networkPolicy:
  enabled: false
